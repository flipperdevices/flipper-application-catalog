    commit_sha: "b6ee60fe936df94823b79e9edd21de0a570863b6"
    subdir: "."
short_description: "Alcohol meter (breathalyzer) using MQ-3 sensor"
description: |
  Breathalyzer application for Flipper Zero using MQ-3 alcohol sensor.
  
  Features:
  - Automatic zero calibration during warmup
  - 5-level intoxication scale (Sober → Light → Medium → Heavy → Critical)
  - Peak detection and sober time estimation
  - Measurement log saved to SD card with date/time
  - Log viewer with scroll
  - Heater auto-shutdown after 60s idle
  
  Requires MQ-3 sensor module connected to GPIO.
