icon: icons/kneeflip_rehab_10px.png
short_description: Timer and counter for clinician-prescribed knee rehab routines
description: "KneeFlip Rehab is a Flipper Zero timer and counter app for knee rehabilitation routines prescribed by a clinician. It helps users follow timed sessions and pace simple user-configured routine blocks. KneeFlip Rehab is a timer and counter tool only. It does not provide medical advice, diagnosis, or treatment. Always follow the recovery plan provided by your doctor, surgeon, or physical therapist."
