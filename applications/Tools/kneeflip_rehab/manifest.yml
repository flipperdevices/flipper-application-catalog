id: kneeflip_rehab
name: KneeFlip Rehab
category: Tools
version: "0.1"
author: Darya Lok
icon: icons/kneeflip_rehab_10px.png
short_description: Timer and journal for prescribed knee rehab routines
description: "KneeFlip Rehab is a Flipper Zero timer and journaling app for knee rehabilitation routines prescribed by a clinician. It helps users follow timed sessions, pace simple user-configured routines, log pain and swelling, record range-of-motion progress, and export recovery data as CSV. KneeFlip Rehab is a timer and journaling tool only. It does not provide medical advice, diagnosis, or treatment. Always follow the recovery plan provided by your doctor, surgeon, or physical therapist."
