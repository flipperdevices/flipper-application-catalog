short_description: Decimal to Mayan numeral converter with direct numeric input
description: |
  Mayan Decoder is an educational math utility for Flipper Zero that converts
  decimal numbers into Mayan numerals.

  The application renders shells, dots, and bars directly with the Flipper
  Canvas API. It includes an intro screen with simple Mayan pyramid artwork,
  arrow-based increment and decrement controls, and a digit editor for faster
  input of larger values.
