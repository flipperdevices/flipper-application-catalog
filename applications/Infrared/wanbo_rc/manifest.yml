description: |
  Wanbo RC turns the Flipper Zero into an infrared remote control for
  Wanbo projectors. Its vertical, icon-based interface follows the layout
  of the original remote and includes power, mouse mode, options, setup,
  mute, focus, return, home, volume, and navigation controls.

  The dedicated D-Pad screen maps the Flipper Zero buttons for comfortable
  use while the device is held vertically. OK and Return can be sent
  directly from this screen.

  **Tested with the Wanbo DaVinci 1.** Other Wanbo projectors that use the
  same infrared remote and command set may also be compatible, but have not
  yet been tested by the author.

