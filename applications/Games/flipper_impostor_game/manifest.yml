short_description: "Undercover-style party game: impostors get a hint, crew gets the secret word."
description: |
  ## Impostor Game

  A social deduction party game for Flipper Zero inspired by Undercover/Spyfall flow. Most players (crew) see the same secret word, while impostors only see a hint tied to that word.

  ## How to play

  - Add players and choose the number of impostors.
  - Pass the device around and reveal each role card one by one.
  - Crew players receive the shared secret word.
  - Impostors receive only a hint and must blend in.
  - The app picks a random first speaker to start discussion.
